apiVersion: apps/v1
kind: Deployment
metadata:
  name: df-db-ibankmesa
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: df-db-ibankmesa
  template:
    metadata:
      labels:
        app: df-db-ibankmesa
    spec:
      securityContext:
        fsGroup: 999

      initContainers:
      - name: db-init
        image: postgres:16
        command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL to be ready..."
            until pg_isready -h localhost -p 5432; do
              sleep 2
            done

            echo "Running DB initialization script..."

            psql -h localhost -U apdbinst -d psqlmesadb -f /sql/wmfomf_v1.sql || true

            echo "DB init completed"

        env:
        - name: PGPASSWORD
          value: Test@12345

        volumeMounts:
        - name: init-sql
          mountPath: /sql

      containers:
      - name: postgres
        image: cache.artifactory.global.standardchartered.com/postgres:16
        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: psqlmesadb
        - name: POSTGRES_USER
          value: apdbinst
        - name: POSTGRES_PASSWORD
          value: Test@12345
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      # 🔹 Your DB storage (UPDATE THIS NAME if needed)
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

      # 🔹 SQL file from node
      - name: init-sql
        hostPath:
          path: /data/postgres-init
          type: DirectoryOrCreate
