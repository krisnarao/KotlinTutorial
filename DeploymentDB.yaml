apiVersion: apps/v1
kind: Deployment
metadata:
  name: df-db-omf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: df-db-omf
  template:
    metadata:
      labels:
        app: df-db-omf
    spec:

      #################################
      # ✅ INIT CONTAINER (RESTORE)
      #################################
      initContainers:
        - name: db-restore
          image: postgres:16
          command:
            - sh
            - -c
            - |
              echo "Waiting for Postgres..."
              until pg_isready -h localhost -p 5432; do
                sleep 5
              done

              echo "Downloading backup..."
              apt-get update && apt-get install -y curl

              curl -o /tmp/backup.sql https://your-repo/backup.sql

              echo "Restoring DB..."
              PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U $POSTGRES_USER -d $POSTGRES_DB -f /tmp/backup.sql

          env:
            - name: POSTGRES_DB
              value: omfdevdb
            - name: POSTGRES_USER
              value: db_app_admin
            - name: POSTGRES_PASSWORD
              value: Test@12345

      #################################
      # ✅ MAIN POSTGRES CONTAINER
      #################################
      containers:
        - name: postgres
          image: cache.artifactory.global.standardchartered.com/postgres:16

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: omfdevdb
            - name: POSTGRES_USER
              value: db_app_admin
            - name: POSTGRES_PASSWORD
              value: Test@12345

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30

          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: pgdata-pvc
