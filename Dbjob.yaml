apiVersion: batch/v1
kind: Job
metadata:
  generateName: postgres-restore-job-
  namespace: default
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never

      volumes:
        - name: backup-volume
          emptyDir: {}

      #################################################
      # 🔽 INIT CONTAINER - DOWNLOAD FROM ARTIFACTORY
      #################################################
      initContainers:
        - name: download-backup
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - >
              set -e;

              echo "===== DOWNLOADING BACKUP =====";

              curl -u your_user:your_password \
                -o /backup/backup.sql \
                https://your-artifactory-url/path/backup_omf.sql;

              echo "===== DOWNLOAD DONE =====";
              ls -l /backup;

          volumeMounts:
            - name: backup-volume
              mountPath: /backup

      #################################################
      # 🔽 MAIN CONTAINER - RESTORE
      #################################################
      containers:
        - name: restore
          image: postgres:16

          env:
            - name: PGPASSWORD
              value: Test@12345

          command:
            - sh
            - -c
            - >
              set -e;

              echo "===== WAITING FOR POSTGRES =====";

              until pg_isready -h df-db-omf-sit-service -p 5401 -U db_app_admin; do
                echo "Waiting for DB...";
                sleep 5;
              done;

              echo "===== DB READY =====";

              echo "===== CHECK BACKUP FILE =====";
              ls -l /backup;

              if [ ! -f /backup/backup.sql ]; then
                echo "ERROR: Backup file not found!";
                exit 1;
              fi;

              echo "===== ENSURE DATABASE EXISTS =====";

              psql -h df-db-omf-sit-service -p 5401 -U db_app_admin -d postgres \
                -tc "SELECT 1 FROM pg_database WHERE datname='omfsitdb'" | grep -q 1 \
                || psql -h df-db-omf-sit-service -p 5401 -U db_app_admin -d postgres \
                -c "CREATE DATABASE omfsitdb";

              echo "===== CHECK IF RESTORE NEEDED =====";

              if psql -h df-db-omf-sit-service -p 5401 -U db_app_admin -d omfsitdb \
                -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='accounts' LIMIT 1" | grep -q 1; then
                echo "Database already has data. Skipping restore.";
                exit 0;
              fi;

              echo "===== STARTING RESTORE =====";

              pg_restore \
                -h df-db-omf-sit-service \
                -p 5401 \
                -U db_app_admin \
                -d omfsitdb \
                --no-owner \
                --no-privileges \
                --verbose \
                /backup/backup.sql;

              echo "===== RESTORE COMPLETED =====";

          volumeMounts:
            - name: backup-volume
              mountPath: /backup

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
