apiVersion: apps/v1
kind: Deployment
metadata:
  name: df-db-ibankmesa
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: df-db-ibankmesa
  template:
    metadata:
      labels:
        app: df-db-ibankmesa
    spec:
      containers:
      - name: postgres
        image: cache.artifactory.global.standardchartered.com/postgres:16
        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: psqlmesadb
        - name: POSTGRES_USER
          value: apdbinst
        - name: POSTGRES_PASSWORD
          value: Test@12345
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata

        volumeMounts:
        # 🔹 Persistent DB storage
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

        # 🔹 SQL init scripts location (AUTO EXECUTION)
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      # 🔹 Your existing PVC (UPDATE THIS NAME)
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc   # 👈 replace with your actual PVC name

      # 🔹 Host path where SQL file exists
      - name: init-sql
        hostPath:
          path: /data/postgres-init   # 👈 path on node
          type: DirectoryOrCreate
