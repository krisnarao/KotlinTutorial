apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-restore-job
  namespace: default
  labels:
    app: postgres-restore
    env: sit
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: postgres-restore
    spec:
      restartPolicy: Never

      containers:
        - name: restore
          image: postgres:16

          env:
            - name: PGPASSWORD
              value: Test@12345

          command:
            - sh
            - -c
            - >
              set -e;

              echo "===== WAITING FOR POSTGRES SERVICE =====";

              until pg_isready -h df-db-omf-sit-service -p 5401 -U db_app_admin; do
                echo "Waiting for DB...";
                sleep 5;
              done;

              echo "===== DB READY =====";

              echo "===== CHECKING BACKUP FILE =====";

              if [ ! -f /tmp/backup_omf.sql ]; then
                echo "ERROR: backup file not found at /tmp/backup_omf.sql";
                exit 1;
              fi;

              ls -l /tmp/backup_omf.sql;

              echo "===== ENSURING DATABASE EXISTS =====";

              psql -h df-db-omf-sit-service -p 5401 -U db_app_admin -d postgres \
                -tc "SELECT 1 FROM pg_database WHERE datname='omfsitdb'" | grep -q 1 \
                || psql -h df-db-omf-sit-service -p 5401 -U db_app_admin -d postgres \
                -c "CREATE DATABASE omfsitdb";

              echo "===== CHECKING IF RESTORE IS NEEDED =====";

              if psql -h df-db-omf-sit-service -p 5401 -U db_app_admin -d omfsitdb \
                -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='accounts' LIMIT 1" | grep -q 1; then
                echo "Database already contains data. Skipping restore.";
                exit 0;
              fi;

              echo "===== STARTING RESTORE USING pg_restore =====";

              pg_restore \
                -h df-db-omf-sit-service \
                -p 5401 \
                -U db_app_admin \
                -d omfsitdb \
                --no-owner \
                --no-privileges \
                --verbose \
                /tmp/backup_omf.sql;

              echo "===== RESTORE COMPLETED SUCCESSFULLY =====";

          volumeMounts:
            - name: host-backup
              mountPath: /tmp

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: host-backup
          hostPath:
            path: /tmp
            type: Directory
