apiVersion: v1
kind: Namespace
metadata:
  name: ibm-mq

---
apiVersion: v1
kind: Secret
metadata:
  name: mq-secret
  namespace: ibm-mq
type: Opaque
stringData:
  MQ_ADMIN_PASSWORD: "Passw0rd123"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mq-pvc
  namespace: ibm-mq
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibm-mq
  namespace: ibm-mq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ibm-mq
  template:
    metadata:
      labels:
        app: ibm-mq
    spec:
      containers:
      - name: ibm-mq
        image: icr.io/ibm-messaging/mq:latest
        ports:
        - containerPort: 1414   # MQ
        - containerPort: 9443   # Web console
        env:
        - name: LICENSE
          value: "accept"
        - name: MQ_QMGR_NAME
          value: "QM1"
        - name: MQ_ADMIN_USER
          value: "admin"
        - name: MQ_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mq-secret
              key: MQ_ADMIN_PASSWORD
        - name: MQ_APP_PASSWORD
          value: "app123"
        volumeMounts:
        - name: mq-data
          mountPath: /mnt/mqm
      volumes:
      - name: mq-data
        persistentVolumeClaim:
          claimName: mq-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ibm-mq-service
  namespace: ibm-mq
spec:
  type: NodePort
  selector:
    app: ibm-mq
  ports:
  - name: mq
    port: 1414
    targetPort: 1414
    nodePort: 31414
  - name: web
    port: 9443
    targetPort: 9443
    nodePort: 32443
