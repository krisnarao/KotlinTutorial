lifecycle:
  postStart:
    exec:
      command:
        - sh
        - -c
        - >
          set -x;
          echo "POSTSTART TRIGGERED";

          sleep 5;

          if ! command -v pg_isready >/dev/null 2>&1; then
            echo "pg_isready NOT FOUND";
            exit 1;
          fi;

          echo "WAITING FOR DB";

          until pg_isready -h localhost -U $POSTGRES_USER; do
            echo "waiting...";
            sleep 3;
          done;

          echo "DB READY";

          ls -l /tmp;

          if [ -f /tmp/backup_omf.sql ]; then
            echo "FOUND BACKUP";

            PGPASSWORD=$POSTGRES_PASSWORD psql \
              -h localhost \
              -U $POSTGRES_USER \
              -d $POSTGRES_DB \
              -f /tmp/backup_omf.sql;

            echo "RESTORE DONE";
          else
            echo "NO BACKUP FILE";
          fi;
